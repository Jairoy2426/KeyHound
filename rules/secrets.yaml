rules:
  # ─── Cloud / Infrastructure ────────────────────────────────────────────────
  - name: AWS Access Key ID
    provider: AWS
    severity: CRITICAL
    regex: 'AKIA[0-9A-Z]{16}'

  - name: AWS Secret Access Key
    provider: AWS
    severity: CRITICAL
    regex: '(?i)aws[_\-\s]?secret[_\-\s]?access[_\-\s]?key[\s"''=:]+([A-Za-z0-9/+=]{40})'

  - name: AWS Session Token
    provider: AWS
    severity: HIGH
    regex: '(?i)aws[_\-\s]?session[_\-\s]?token[\s"''=:]+([A-Za-z0-9/+=]{100,})'

  - name: Google API Key
    provider: Google
    severity: HIGH
    regex: 'AIza[0-9A-Za-z\-_]{35}'

  - name: Google OAuth Client Secret
    provider: Google
    severity: CRITICAL
    regex: 'GOCSPX-[0-9A-Za-z\-_]{28}'

  - name: Firebase API Key
    provider: Google
    severity: HIGH
    regex: '(?i)firebase[_\-\s]?api[_\-\s]?key[\s"''=:]+([A-Za-z0-9\-_]{35,})'

  - name: Firebase Realtime Database URL
    provider: Google
    severity: LOW
    regex: '[a-z0-9\-]+\.firebaseio\.com'

  - name: Firebase Storage Bucket
    provider: Google
    severity: LOW
    regex: '[a-z0-9\-]+\.appspot\.com'

  - name: GCP Service Account Key
    provider: GCP
    severity: CRITICAL
    regex: '"type":\s*"service_account"'

  - name: Azure Storage Account Key
    provider: Azure
    severity: CRITICAL
    regex: '(?i)DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{88}'

  - name: Azure Client Secret
    provider: Azure
    severity: CRITICAL
    regex: '(?i)azure[_\-\s]?client[_\-\s]?secret[\s"''=:]+([A-Za-z0-9~._\-]{34,})'

  - name: DigitalOcean Access Token
    provider: DigitalOcean
    severity: CRITICAL
    regex: 'dop_v1_[a-f0-9]{64}'

  - name: DigitalOcean Refresh Token
    provider: DigitalOcean
    severity: CRITICAL
    regex: 'dor_v1_[a-f0-9]{64}'

  # ─── Payment Processors ─────────────────────────────────────────────────────
  - name: Stripe Live Secret Key
    provider: Stripe
    severity: CRITICAL
    regex: 'sk_live_[0-9a-zA-Z]{24,}'

  - name: Stripe Test Secret Key
    provider: Stripe
    severity: HIGH
    regex: 'sk_test_[0-9a-zA-Z]{24,}'

  - name: Stripe Publishable Live Key
    provider: Stripe
    severity: LOW
    regex: 'pk_live_[0-9a-zA-Z]{24,}'

  - name: PayPal Client ID
    provider: PayPal
    severity: HIGH
    regex: '(?i)paypal[_\-\s]?client[_\-\s]?id[\s"''=:]+([A-Za-z0-9_\-]{20,})'

  - name: PayPal Client Secret
    provider: PayPal
    severity: CRITICAL
    regex: '(?i)paypal[_\-\s]?client[_\-\s]?secret[\s"''=:]+([A-Za-z0-9_\-]{20,})'

  - name: Square Access Token
    provider: Square
    severity: CRITICAL
    regex: 'sq0atp-[0-9A-Za-z\-_]{22}'

  - name: Square OAuth Secret
    provider: Square
    severity: CRITICAL
    regex: 'sq0csp-[0-9A-Za-z\-_]{43}'

  - name: Coinbase API Key
    provider: Coinbase
    severity: CRITICAL
    regex: '(?i)coinbase[_\-\s]?api[_\-\s]?key[\s"''=:]+([A-Za-z0-9]{32,})'

  # ─── Communication / Messaging ──────────────────────────────────────────────
  - name: Twilio Account SID
    provider: Twilio
    severity: HIGH
    regex: 'AC[0-9a-fA-F]{32}'

  - name: Twilio Auth Token
    provider: Twilio
    severity: CRITICAL
    regex: '(?i)twilio[_\-\s]?auth[_\-\s]?token[\s"''=:]+([a-zA-Z0-9]{32})'

  - name: SendGrid API Key
    provider: SendGrid
    severity: CRITICAL
    regex: 'SG\.[a-zA-Z0-9_\-]{22}\.[a-zA-Z0-9_\-]{43}'

  - name: Mailgun API Key
    provider: Mailgun
    severity: CRITICAL
    regex: 'key-[0-9a-zA-Z]{32}'

  - name: Mailgun Public Key
    provider: Mailgun
    severity: HIGH
    regex: 'pubkey-[0-9a-zA-Z]{32}'

  - name: Slack Bot Token
    provider: Slack
    severity: HIGH
    regex: 'xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}'

  - name: Slack Webhook URL
    provider: Slack
    severity: HIGH
    regex: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+'

  - name: Slack Legacy Token
    provider: Slack
    severity: HIGH
    regex: 'xox[oe]-[0-9]{10,13}-[a-zA-Z0-9]{10,20}'

  - name: Discord Bot Token
    provider: Discord
    severity: HIGH
    regex: '[MN][A-Za-z0-9]{23}\.[A-Za-z0-9\-_]{6}\.[A-Za-z0-9\-_]{27}'

  - name: Discord Webhook URL
    provider: Discord
    severity: HIGH
    regex: 'https://discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9\-_]+'

  # ─── Source Control / Dev Tools ─────────────────────────────────────────────
  - name: GitHub Personal Access Token (Classic)
    provider: GitHub
    severity: CRITICAL
    regex: 'ghp_[0-9a-zA-Z]{36}'

  - name: GitHub Fine-Grained Token
    provider: GitHub
    severity: CRITICAL
    regex: 'github_pat_[0-9a-zA-Z_]{82}'

  - name: GitHub OAuth Token
    provider: GitHub
    severity: CRITICAL
    regex: 'gho_[0-9a-zA-Z]{36}'

  - name: GitHub App Token
    provider: GitHub
    severity: CRITICAL
    regex: '(ghu|ghs)_[0-9a-zA-Z]{36}'

  - name: GitLab Personal Access Token
    provider: GitLab
    severity: CRITICAL
    regex: 'glpat-[0-9a-zA-Z\-_]{20}'

  - name: npm Access Token
    provider: npm
    severity: CRITICAL
    regex: 'npm_[A-Za-z0-9]{36}'

  - name: Heroku API Key
    provider: Heroku
    severity: CRITICAL
    regex: '(?i)heroku[_\-\s]?(?:api[_\-\s]?)?(?:key|token)[\s"''=:]+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'

  # ─── CRM / Marketing ────────────────────────────────────────────────────────
  - name: HubSpot API Key
    provider: HubSpot
    severity: HIGH
    regex: '(?i)hubspot[_\-\s]?api[_\-\s]?key[\s"''=:]+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'

  - name: Shopify Private App Password
    provider: Shopify
    severity: CRITICAL
    regex: 'shppa_[0-9a-fA-F]{32}'

  - name: Shopify Access Token
    provider: Shopify
    severity: CRITICAL
    regex: 'shpat_[0-9a-fA-F]{32}'

  - name: Shopify Shared Secret
    provider: Shopify
    severity: HIGH
    regex: 'shpss_[0-9a-fA-F]{32}'

  # ─── Identity / Auth ─────────────────────────────────────────────────────────
  - name: Okta API Token
    provider: Okta
    severity: CRITICAL
    regex: '00[A-Za-z0-9_\-]{40}'

  - name: JWT Token
    provider: Generic
    severity: HIGH
    regex: 'eyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+'

  - name: Basic Auth in URL
    provider: Generic
    severity: CRITICAL
    regex: 'https?://[^:@\s]+:[^@\s]+@[^\s]+'

  - name: Private Key Block (RSA)
    provider: Generic
    severity: CRITICAL
    regex: '-----BEGIN RSA PRIVATE KEY-----'

  - name: Private Key Block (Generic)
    provider: Generic
    severity: CRITICAL
    regex: '-----BEGIN PRIVATE KEY-----'

  - name: Private Key Block (EC)
    provider: Generic
    severity: CRITICAL
    regex: '-----BEGIN EC PRIVATE KEY-----'

  - name: PGP Private Key Block
    provider: Generic
    severity: CRITICAL
    regex: '-----BEGIN PGP PRIVATE KEY BLOCK-----'

  - name: SSH Private Key (OpenSSH)
    provider: Generic
    severity: CRITICAL
    regex: '-----BEGIN OPENSSH PRIVATE KEY-----'

  # ─── Database / Connection Strings ──────────────────────────────────────────
  - name: MongoDB Connection String
    provider: MongoDB
    severity: CRITICAL
    regex: 'mongodb(\+srv)?://[^:@\s]+:[^@\s]+@[^\s]+'

  - name: PostgreSQL Connection String
    provider: PostgreSQL
    severity: CRITICAL
    regex: 'postgres(ql)?://[^:@\s]+:[^@\s]+@[^\s]+'

  - name: MySQL Connection String
    provider: MySQL
    severity: CRITICAL
    regex: 'mysql://[^:@\s]+:[^@\s]+@[^\s]+'

  - name: Redis Connection String
    provider: Redis
    severity: HIGH
    regex: 'redis://:[^@\s]+@[^\s]+'

  # ─── Miscellaneous ─────────────────────────────────────────────────────────
  - name: Generic Secret Assignment
    provider: Generic
    severity: LOW
    regex: '(?i)(?:secret|api_key|apikey|auth_token|access_token|private_key)[_\-\s]*[=:]\s*["\x27]([A-Za-z0-9_\-+/=!@#$%^&*]{20,})["\x27]'

  - name: Generic Bearer Token
    provider: Generic
    severity: LOW
    regex: '(?i)Bearer\s+([A-Za-z0-9\-_=+/]{32,})'

  - name: Mapbox API Token
    provider: Mapbox
    severity: HIGH
    regex: 'pk\.eyJ1[A-Za-z0-9._\-]+'

  - name: Cloudinary API Key
    provider: Cloudinary
    severity: HIGH
    regex: 'cloudinary://[0-9]+:[A-Za-z0-9_\-]+@[a-z0-9]+'

  - name: Twitch Client Secret
    provider: Twitch
    severity: CRITICAL
    regex: '(?i)twitch[_\-\s]?client[_\-\s]?secret[\s"''=:]+([a-z0-9]{30})'

  - name: Twitter Bearer Token
    provider: Twitter
    severity: HIGH
    regex: 'AAAAAAAAAA[A-Za-z0-9%_\-+/=]{50,}'

  - name: Algolia Application Key
    provider: Algolia
    severity: HIGH
    regex: '(?i)algolia[_\-\s]?(?:api[_\-\s]?)?key[\s"''=:]+([A-Za-z0-9]{32})'
